name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -r requirements.txt
      - name: Sensitive-disclosures gate
        run: python scripts/validate_sensitive_disclosures.py
      - name: Tests
        run: python -m pytest
